<!DOCTYPE html>
<!--
  ALIEN RUNNER — a tiny endless runner
  ------------------------------------
  HOW TO RUN:  save this file as alien-runner.html and open it in any browser.
  CONTROLS:    SPACEBAR or TAP/CLICK to jump. Release early for a shorter hop.
  RULES:       Jump over glowing craters and jagged rocks. The world speeds up
               every 10 seconds. One hit ends the run. Survive to score.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alien Runner</title>
<style>
  html,body{margin:0;height:100%;background:#0a0514;display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(96vw,900px);height:auto;border:2px solid #6d3bbf;border-radius:8px;
         box-shadow:0 0 30px rgba(109,59,191,.45);touch-action:manipulation;cursor:pointer}
</style>
</head>
<body>
<canvas id="c" width="800" height="400"></canvas>
<script>
"use strict";
const cvs = document.getElementById("c"), ctx = cvs.getContext("2d");
const W = 800, H = 400, GROUND = 330;
const G_UP = 0.7, G_DOWN = 1.25, JUMP_V = 14;      // snappy physics (per-frame units)
const BASE_SPEED = 4.2, MAX_SPEED = 10;

let state = "start", deadAt = 0, last = performance.now();
let elapsed, score, speed, dist, spawnDist, alien, obstacles, particles;

// --- starfield (two parallax layers) ---
const stars1 = [], stars2 = [];
for (let i = 0; i < 60; i++) stars1.push({x:Math.random()*W, y:Math.random()*(GROUND-40), r:Math.random()*1.1+0.4});
for (let i = 0; i < 30; i++) stars2.push({x:Math.random()*W, y:Math.random()*(GROUND-60), r:Math.random()*1.6+0.8});

function reset(){
  elapsed = 0; score = 0; speed = BASE_SPEED; dist = 0;
  spawnDist = 500;                                  // breathing room before first obstacle
  alien = {x:110, y:GROUND, vy:0, onGround:true};
  obstacles = []; particles = [];
}

// --- obstacles: never spawn a gap that can't be cleared ---
function spawnObstacle(){
  const type = Math.random() < 0.45 ? "crater" : "rock";
  let o;
  if (type === "crater"){
    const w = 50 + Math.random()*45;
    o = {type, x:W+60, w, h:12, y:GROUND-6};        // pit at ground level
  } else {
    const h = 28 + Math.random()*36;                // max 64 < jump apex (~140)
    const w = 26 + Math.random()*26;
    o = {type, x:W+60, w, h, y:GROUND-h, spikes:3+((Math.random()*3)|0), seed:Math.random()*9};
  }
  obstacles.push(o);
  // min gap = distance covered during a full jump + reaction time, scales with speed
  const minGap = speed * 58;
  let extra = Math.random() * speed * 40;
  if (elapsed < 18) extra += 130;                   // gentle opening ~15-20s
  spawnDist = minGap + extra + o.w;
}

function die(){
  state = "dead"; deadAt = performance.now();
  for (let i = 0; i < 42; i++){
    const a = Math.random()*Math.PI*2, s = 2+Math.random()*5;
    particles.push({x:alien.x+14, y:alien.y-20, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
                    life:1, col:Math.random()<0.6 ? "#39ff6e" : "#b06bff"});
  }
}

function update(dt){
  elapsed += dt/60;
  speed = Math.min(BASE_SPEED + Math.floor(elapsed/10)*0.55, MAX_SPEED);
  dist += speed*dt;
  score = elapsed*10;

  // alien physics
  alien.vy += (alien.vy < 0 ? G_UP : G_DOWN) * dt;
  alien.y += alien.vy * dt;
  if (alien.y >= GROUND){ alien.y = GROUND; alien.vy = 0; alien.onGround = true; }
  else alien.onGround = false;

  // spawn + move obstacles
  spawnDist -= speed*dt;
  if (spawnDist <= 0) spawnObstacle();
  for (let i = obstacles.length-1; i >= 0; i--){
    const o = obstacles[i];
    o.x -= speed*dt;
    if (o.x + o.w < -20){ obstacles.splice(i,1); continue; }
    // collision (forgiving AABB)
    const ax = alien.x+5, aw = 20, ay = alien.y-36, ah = 34;
    if (o.type === "crater"){
      if (alien.y >= GROUND-2 && ax+aw > o.x+8 && ax < o.x+o.w-8) die();
    } else {
      if (ax+aw > o.x+4 && ax < o.x+o.w-4 && ay+ah > o.y+4) die();
    }
  }
}

function updateParticles(dt){
  for (let i = particles.length-1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 0.18*dt; p.life -= 0.02*dt;
    if (p.life <= 0) particles.splice(i,1);
  }
}

function jump(){
  if (alien.onGround){ alien.vy = -JUMP_V; alien.onGround = false; }
}
function jumpCut(){ if (alien.vy < -6) alien.vy = -6; }     // release early = short hop

// --- drawing ---
function drawBackground(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#07030f"); g.addColorStop(0.75,"#150a2b"); g.addColorStop(1,"#241040");
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "#cfd8ff";
  for (const s of stars1){ let x=(s.x - dist*0.08)%W; if(x<0)x+=W; ctx.globalAlpha=0.6; ctx.fillRect(x,s.y,s.r,s.r); }
  ctx.fillStyle = "#e9dcff";
  for (const s of stars2){ let x=(s.x - dist*0.2)%W; if(x<0)x+=W; ctx.globalAlpha=0.9; ctx.fillRect(x,s.y,s.r,s.r); }
  ctx.globalAlpha = 1;
  // distant purple ridge (mid parallax)
  ctx.fillStyle = "#2b1355";
  ctx.beginPath(); ctx.moveTo(0,GROUND);
  for (let x = 0; x <= W; x += 16){
    const t = (x + dist*0.4) * 0.012;
    ctx.lineTo(x, GROUND - 26 - Math.sin(t)*14 - Math.sin(t*2.7)*7);
  }
  ctx.lineTo(W,GROUND); ctx.closePath(); ctx.fill();
}

function drawGround(){
  ctx.fillStyle = "#3b1d5e"; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle = "#8d5bff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();
  ctx.fillStyle = "#54309c";                         // scrolling speckles
  for (let i = 0; i < 26; i++){
    let x = (i*137 - dist) % W; if (x < 0) x += W;
    ctx.fillRect(x, GROUND + 12 + (i*53)%48, 8, 3);
  }
}

function drawObstacle(o){
  if (o.type === "crater"){
    ctx.save(); ctx.shadowColor = "#39ff6e"; ctx.shadowBlur = 14;
    ctx.fillStyle = "#0a0514";
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, GROUND+3, o.w/2, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#39ff6e"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, GROUND+1, o.w/2, 7, 0, Math.PI, Math.PI*2); ctx.stroke();
    ctx.restore();
  } else {
    ctx.save(); ctx.shadowColor = "#b06bff"; ctx.shadowBlur = 8;
    ctx.fillStyle = "#241040"; ctx.strokeStyle = "#8d5bff"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(o.x, GROUND);
    for (let i = 0; i <= o.spikes; i++){
      const px = o.x + (o.w * i) / o.spikes;
      const py = (i === 0 || i === o.spikes) ? GROUND
               : o.y + Math.abs(Math.sin(o.seed + i*2.4)) * o.h * 0.35;
      if (i > 0) ctx.lineTo(px - o.w/(o.spikes*2), o.y + (i%2)*6);   // jagged peaks
      ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
  }
}

function drawAlien(){
  const x = alien.x, y = alien.y;
  ctx.save(); ctx.shadowColor = "#39ff6e"; ctx.shadowBlur = 10;
  // legs (run cycle on ground, tucked in air)
  ctx.strokeStyle = "#2ecc5e"; ctx.lineWidth = 4; ctx.lineCap = "round";
  if (alien.onGround){
    const ph = Math.sin(dist*0.25)*6;
    ctx.beginPath(); ctx.moveTo(x+9,y-10);  ctx.lineTo(x+5+ph, y);   ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+19,y-10); ctx.lineTo(x+23-ph, y);  ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(x+9,y-10);  ctx.lineTo(x+7, y-4);    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+19,y-10); ctx.lineTo(x+21, y-4);   ctx.stroke();
  }
  // body + dome head
  ctx.fillStyle = "#39ff6e";
  ctx.beginPath(); ctx.ellipse(x+14, y-18, 12, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+14, y-30, 9, 8, 0, 0, Math.PI*2); ctx.fill();
  // antennae with glowing tips
  ctx.strokeStyle = "#39ff6e"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x+9,y-36);  ctx.lineTo(x+5,y-44);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+19,y-36); ctx.lineTo(x+23,y-44); ctx.stroke();
  ctx.fillStyle = "#d6ffe2";
  ctx.beginPath(); ctx.arc(x+5,y-45,2.4,0,Math.PI*2); ctx.arc(x+23,y-45,2.4,0,Math.PI*2); ctx.fill();
  // big dark eyes
  ctx.shadowBlur = 0; ctx.fillStyle = "#0a0514";
  ctx.beginPath(); ctx.ellipse(x+11,y-31,2.6,3.6,0,0,Math.PI*2);
  ctx.ellipse(x+17,y-31,2.6,3.6,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticles(){
  for (const p of particles){
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x, p.y, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function drawHUD(){
  ctx.fillStyle = "#39ff6e"; ctx.font = "bold 22px monospace"; ctx.textAlign = "right";
  ctx.fillText("SCORE " + Math.floor(score), W-18, 34);
  ctx.fillStyle = "#8d5bff"; ctx.font = "14px monospace";
  ctx.fillText("SPEED x" + (speed/BASE_SPEED).toFixed(1), W-18, 56);
}

function overlay(title, sub1, sub2){
  ctx.fillStyle = "rgba(7,3,15,0.72)"; ctx.fillRect(0,0,W,H);
  ctx.textAlign = "center";
  ctx.save(); ctx.shadowColor = "#39ff6e"; ctx.shadowBlur = 18;
  ctx.fillStyle = "#39ff6e"; ctx.font = "bold 44px monospace";
  ctx.fillText(title, W/2, H/2 - 46); ctx.restore();
  ctx.fillStyle = "#e9dcff"; ctx.font = "20px monospace";
  ctx.fillText(sub1, W/2, H/2 + 2);
  ctx.fillStyle = "#8d5bff"; ctx.font = "16px monospace";
  ctx.fillText(sub2, W/2, H/2 + 34);
}

function frame(now){
  let dt = (now - last) / 16.667; last = now;
  dt = Math.min(Math.max(dt, 0), 3);                // tab-switch safety clamp

  if (state === "play") update(dt);
  updateParticles(dt);

  drawBackground(); drawGround();
  for (const o of obstacles) drawObstacle(o);
  if (state !== "dead") drawAlien();
  drawParticles();
  if (state !== "start") drawHUD();

  if (state === "start")
    overlay("ALIEN RUNNER", "SPACE or TAP to jump", "press SPACE / click to start");
  else if (state === "dead")
    overlay("GAME OVER", "FINAL SCORE: " + Math.floor(score), "click or press SPACE to restart");

  requestAnimationFrame(frame);
}

// --- input ---
function press(){
  if (state === "start"){ reset(); state = "play"; }
  else if (state === "play") jump();
  else if (state === "dead" && performance.now() - deadAt > 600){ reset(); state = "play"; }
}
addEventListener("keydown", e => {
  if (e.code === "Space" && !e.repeat){ e.preventDefault(); press(); }
});
addEventListener("keyup", e => { if (e.code === "Space" && state === "play") jumpCut(); });
cvs.addEventListener("pointerdown", e => { e.preventDefault(); press(); });
cvs.addEventListener("pointerup", () => { if (state === "play") jumpCut(); });

reset();
requestAnimationFrame(frame);
</script>
</body>
</html>
