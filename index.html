    html, body { height: 100%; overscroll-behavior: none; }
    body { background: #0a0f0d; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0; height: 0; }

    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .safe-top { padding-top: env(safe-area-inset-top, 0px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px) scale(0.995); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-fadeUp { animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }

    /* Boiling Point Vaporizer slider (touch-first) */
    .vapor-slider {
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      border-radius: 9999px;
      background: linear-gradient(90deg, #1c2822 0%, #f59e0b 55%, #ef4444 100%);
      outline: none;
      touch-action: none;
    }
    .vapor-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      height: 24px; width: 24px;
      border-radius: 50%;
      background: #fb923c;
      border: 3px solid #0a0f0d;
      box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.25), 0 2px 6px rgba(0,0,0,0.5);
    }
    .vapor-slider::-moz-range-thumb {
      height: 22px; width: 22px;
      border-radius: 50%;
      background: #fb923c;
      border: 3px solid #0a0f0d;
      box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.25);
    }

    @keyframes heatPulse {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    .animate-heatPulse { animation: heatPulse 1.1s ease-in-out infinite; }

    /* ============================================================
       BOILING POINTS (°C) — vaporization temps for the slider
       ============================================================ */
    const BOILING_POINTS = {
      THC: 157, CBD: 170, CBG: 220,
      Humulene: 106, Caryophyllene: 130, Pinene: 155, Myrcene: 167,
      Limonene: 176, Terpinolene: 186, Linalool: 198,
    };
    const VAPOR_MIN = 100;
    const VAPOR_MAX = 230;
    const VAPOR_COLOR = '#fb923c';

    function vaporizingSet(strain, temp) {
      const set = new Set();
      const all = { ...strain.composition.cannabinoids, ...strain.composition.terpenes };
      Object.keys(all).forEach((name) => {
        const bp = BOILING_POINTS[name];
        if (bp != null && temp >= bp) set.add(name);
      });
      return set;
    }

    /* ---------- PubChem + Three.js helpers ---------- */

    const PUBCHEM_NAMES = {
      THC: 'dronabinol',
      CBD: 'cannabidiol',
      CBG: 'cannabigerol',
      Myrcene: 'beta-myrcene',
      Limonene: 'limonene',
      Pinene: 'alpha-pinene',
      Linalool: 'linalool',
      Caryophyllene: 'beta-caryophyllene',
      Terpinolene: 'terpinolene',
      Humulene: 'alpha-humulene',
    };

    const ELEMENTS = {
      1:  { color: 0xf3f4f6, radius: 0.26, symbol: 'H',  name: 'Hydrogen',   weight: 1.008 },
      6:  { color: 0x3a4750, radius: 0.42, symbol: 'C',  name: 'Carbon',     weight: 12.011 },
      7:  { color: 0x3b82f6, radius: 0.40, symbol: 'N',  name: 'Nitrogen',   weight: 14.007 },
      8:  { color: 0xef4444, radius: 0.40, symbol: 'O',  name: 'Oxygen',     weight: 15.999 },
      15: { color: 0xf97316, radius: 0.46, symbol: 'P',  name: 'Phosphorus', weight: 30.974 },
      16: { color: 0xeab308, radius: 0.46, symbol: 'S',  name: 'Sulfur',     weight: 32.06 },
      17: { color: 0x22c55e, radius: 0.44, symbol: 'Cl', name: 'Chlorine',   weight: 35.45 },
    };
    const FALLBACK_ELEMENT = { color: 0xd946ef, radius: 0.42, symbol: '?', name: 'Unknown', weight: 0 };

    const ATOM_NOTES = {
      THC: { 8: 'Phenolic / pyran oxygen — key contact for CB1 receptor binding' },
      CBD: { 8: 'Hydroxyl oxygen — drives CBD’s polarity and hydrogen bonding' },
      CBG: { 8: 'Hydroxyl oxygen — reactive site in cannabinoid biosynthesis' },
      Linalool: { 8: 'Hydroxyl oxygen — source of linalool’s floral, polar character' },
    };

    const TOUR_TEXT = {
      THC: {
        overview: 'The full Δ9-THC conformer. Every atom sits in PubChem’s lowest-energy geometry. Drag to explore, or let the tour drive.',
        core: 'The fused ring scaffold — the rigid core that locks THC’s pharmacophore into the exact geometry CB1 recognizes.',
        polar: 'The phenolic / pyran oxygens. This polar “business end” hydrogen-bonds deep inside the receptor pocket.',
        tail: 'The pentyl tail. This greasy chain makes THC fat-soluble, letting it cross the blood–brain barrier.',
      },
    };

    function disposeGroup(group) {
      group.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      });
      while (group.children.length) group.remove(group.children[0]);
    }

    function centroidOf(indices, positions) {
      const c = new THREE.Vector3();
      if (!indices.length) return c;
      indices.forEach((i) => c.add(positions[i]));
      return c.multiplyScalar(1 / indices.length);
    }

    function buildMolecule(record, displayName) {
      const compound = record.PC_Compounds[0];
      const elements = compound.atoms.element;
      const aids = compound.atoms.aid;
      const conf = compound.coords[0].conformers[0];
      const aidToIndex = {};
      aids.forEach((id, i) => { aidToIndex[id] = i; });

      const n = elements.length;
      let cx = 0, cy = 0, cz = 0;
      for (let i = 0; i < n; i++) {
        cx += conf.x[i]; cy += conf.y[i]; cz += (conf.z ? conf.z[i] : 0);
      }
      cx /= n; cy /= n; cz /= n;

      const positions = [];
      let radius = 0;
      for (let i = 0; i < n; i++) {
        const p = new THREE.Vector3(
          conf.x[i] - cx,
          conf.y[i] - cy,
          (conf.z ? conf.z[i] : 0) - cz
        );
        positions.push(p);
        radius = Math.max(radius, p.length());
      }

      const group = new THREE.Group();
      const formulaCounts = {};
      const atoms = [];
      const notes = ATOM_NOTES[displayName] || {};

      // Atoms (balls) — 20 segments for mobile GPU friendliness
      for (let i = 0; i < n; i++) {
        const an = elements[i];
        const el = ELEMENTS[an] || FALLBACK_ELEMENT;
        formulaCounts[el.symbol] = (formulaCounts[el.symbol] || 0) + 1;
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(el.radius, 20, 20),
          new THREE.MeshPhongMaterial({
            color: el.color,
            shininess: 110,
            specular: 0x556677,
            emissive: el.color,
            emissiveIntensity: 0.06,
          })
        );
        mesh.position.copy(positions[i]);
        const atom = {
          mesh, atomicNumber: an, symbol: el.symbol, name: el.name,
          weight: el.weight, note: notes[an] || null, position: positions[i].clone(),
        };
        mesh.userData.atom = atom;
        group.add(mesh);
        atoms.push(atom);
      }

      // Bonds
      const doubleBonds = [];
      const up = new THREE.Vector3(0, 1, 0);
      const bonds = compound.bonds;
      if (bonds) {
        for (let i = 0; i < bonds.aid1.length; i++) {
          const a = positions[aidToIndex[bonds.aid1[i]]];
          const b = positions[aidToIndex[bonds.aid2[i]]];
          if (!a || !b) continue;
          const order = bonds.order ? bonds.order[i] : 1;
          const dir = new THREE.Vector3().subVectors(b, a);
          const len = dir.length();
          const ndir = dir.clone().normalize();
          const mid = a.clone().lerp(b, 0.5);

          let perp = new THREE.Vector3(0, 1, 0).cross(ndir);
          if (perp.lengthSq() < 1e-4) perp = new THREE.Vector3(1, 0, 0).cross(ndir);
          perp.normalize();

          const makeCyl = (offset, rad, isMultiple) => {
            const mat = new THREE.MeshPhongMaterial({
              color: 0x9ca3af, shininess: 45, specular: 0x333333,
              emissive: isMultiple ? 0x22d3ee : 0x000000,
              emissiveIntensity: isMultiple ? 0.3 : 0,
            });
            const cyl = new THREE.Mesh(new THREE.CylinderGeometry(rad, rad, len, 10), mat);
            cyl.position.copy(mid).add(offset);
            cyl.quaternion.setFromUnitVectors(up, ndir);
            group.add(cyl);
            if (isMultiple) doubleBonds.push(cyl);
          };

          if (order === 2) {
            const o = perp.clone().multiplyScalar(0.11);
            makeCyl(o, 0.05, true);
            makeCyl(o.clone().negate(), 0.05, true);
          } else if (order >= 3) {
            const o = perp.clone().multiplyScalar(0.14);
            makeCyl(o, 0.045, true);
            makeCyl(new THREE.Vector3(), 0.045, true);
            makeCyl(o.clone().negate(), 0.045, true);
          } else {
            makeCyl(new THREE.Vector3(), 0.07, false);
          }
        }
      }

      const orderKeys = Object.keys(formulaCounts).sort((x, y) => {
        const rank = (s) => (s === 'C' ? 0 : s === 'H' ? 1 : 2);
        return rank(x) - rank(y) || x.localeCompare(y);
      });
      const formula = orderKeys.map((s) => s + (formulaCounts[s] > 1 ? formulaCounts[s] : '')).join('');

      // Guided-tour stops
      const carbonIdx = [], heteroIdx = [];
      for (let i = 0; i < n; i++) {
        if (elements[i] === 6) carbonIdx.push(i);
        if (elements[i] === 7 || elements[i] === 8) heteroIdx.push(i);
      }
      const coreCentroid = centroidOf(carbonIdx.length ? carbonIdx : atoms.map((_, i) => i), positions);
      const polarCentroid = heteroIdx.length ? centroidOf(heteroIdx, positions) : null;
      const ref = polarCentroid || coreCentroid;
      let tailIdx = 0, tailD = -1;
      for (let i = 0; i < n; i++) {
        if (elements[i] === 1) continue;
        const d = positions[i].distanceTo(ref);
        if (d > tailD) { tailD = d; tailIdx = i; }
      }
      const txt = TOUR_TEXT[displayName] || {};
      const subDist = Math.max(radius * 1.05, 5);
      const tourStops = [
        {
          title: 'Overview',
          text: txt.overview || `Full 3D conformer of ${displayName} — ${n} atoms in PubChem’s lowest-energy geometry. Drag to explore.`,
          target: new THREE.Vector3(0, 0, 0),
          dist: Math.max(radius * 2.6 + 3, 8),
        },
        {
          title: 'Ring / carbon core',
          text: txt.core || `The carbon skeleton — ${displayName}’s rigid backbone that sets its overall shape and how it packs against a receptor.`,
          target: coreCentroid.clone(),
          dist: subDist,
        },
      ];
      if (polarCentroid) {
        tourStops.push({
          title: 'Polar functional group',
          text: txt.polar || `Oxygen / nitrogen functional group — the polar “business end” that hydrogen-bonds inside the binding pocket.`,
          target: polarCentroid.clone(),
          dist: subDist,
        });
      }
      tourStops.push({
        title: 'Hydrophobic tail',
        text: txt.tail || `The hydrophobic alkyl region — greasy carbons that make ${displayName} fat-soluble, helping it cross cell membranes.`,
        target: positions[tailIdx].clone(),
        dist: subDist,
      });

      return { group, radius, atomCount: n, formula, atoms, doubleBonds, tourStops };
    }

    const easeInOut = (t) => (t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2);

    /* ============================================================
       3D MOLECULE VIEWER (touch-first)
       ============================================================ */
    function MoleculeViewer({ strain, activeCompound, visible, vaporTemp }) {
      const allCompounds = { ...strain.composition.cannabinoids, ...strain.composition.terpenes };
      const isCannabinoid = activeCompound && strain.composition.cannabinoids[activeCompound] !== undefined;
      const boilingPoint = activeCompound ? BOILING_POINTS[activeCompound] : null;
      const isVaporizing = boilingPoint != null && vaporTemp >= boilingPoint;

      const mountRef = useRef(null);
      const threeRef = useRef(null);
      const cacheRef = useRef({});
      const modeRef = useRef({ measureMode: false });

      const [status, setStatus] = useState('idle');
      const [errorMsg, setErrorMsg] = useState('');
      const [molInfo, setMolInfo] = useState(null);
      const [measureMode, setMeasureMode] = useState(false);
      const [selectedAtom, setSelectedAtom] = useState(null); // { name, symbol, weight, note }
      const [measureResult, setMeasureResult] = useState(null);
      const [tourStops, setTourStops] = useState([]);
      const [tourIndex, setTourIndex] = useState(-1);
      const [arSupport, setArSupport] = useState(false); // WebXR immersive-ar available?
      const [arActive, setArActive] = useState(false);   // AR session running
      const [arPlaced, setArPlaced] = useState(false);   // molecule anchored in the room
      const [arNotice, setArNotice] = useState(false);   // fallback "no WebXR" notice
      const arOverlayRef = useRef(null);

      const clearMeasure = () => {
        const st = threeRef.current;
        if (st) {
          (st.measurePicks || []).forEach((m) => {
            m.scale.setScalar(1);
            m.material.emissiveIntensity = 0.06;
          });
          st.measurePicks = [];
          if (st.measureLine) { st.molGroup.remove(st.measureLine); st.measureLine = null; }
        }
        setMeasureResult(null);
      };

      const clearSelection = () => {
        const st = threeRef.current;
        if (st && st.selectedMesh) {
          st.selectedMesh.scale.setScalar(1);
          st.selectedMesh.material.emissiveIntensity = 0.06;
          st.selectedMesh = null;
        }
        setSelectedAtom(null);
      };

      const tweenCameraTo = (target, dist) => {
        const st = threeRef.current;
        if (!st) return;
        const off = new THREE.Vector3(0.6, 0.35, 1).normalize().multiplyScalar(dist);
        st.tween = {
          fromP: st.camera.position.clone(),
          toP: target.clone().add(off),
          fromT: st.controls.target.clone(),
          toT: target.clone(),
          t: 0, dur: 1.4,
        };
        st.controls.enabled = false;
      };

      /* ---------- WebXR Augmented Reality ---------- */

      // Detect immersive-ar support once on mount
      useEffect(() => {
        let mounted = true;
        if (navigator.xr && navigator.xr.isSessionSupported) {
          navigator.xr.isSessionSupported('immersive-ar')
            .then((ok) => { if (mounted) setArSupport(!!ok); })
            .catch(() => { if (mounted) setArSupport(false); });
        }
        // taps on the dom-overlay UI must not double as "place molecule" taps
        const overlay = arOverlayRef.current;
        const blockSelect = (e) => e.preventDefault();
        if (overlay) overlay.addEventListener('beforexrselect', blockSelect);
        return () => {
          mounted = false;
          if (overlay) overlay.removeEventListener('beforexrselect', blockSelect);
        };
      }, []);

      const endAR = () => {
        const st = threeRef.current;
        if (st && st.arSession) { try { st.arSession.session.end(); } catch (e) {} }
      };

      const startAR = async () => {
        const st = threeRef.current;
        if (!st || st.arSession) return;
        if (!arSupport || !navigator.xr) { setArNotice(true); return; }
        try {
          const sessionInit = { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'] };
          if (arOverlayRef.current) sessionInit.domOverlay = { root: arOverlayRef.current };

          // Prompts for camera access and starts the AR session
          const session = await navigator.xr.requestSession('immersive-ar', sessionInit);

          // Hand the render loop over to WebXR
          cancelAnimationFrame(st.raf);

          // Hit-test reticle — marks the detected real-world surface
          const reticle = new THREE.Mesh(
            new THREE.RingGeometry(0.06, 0.08, 32).rotateX(-Math.PI / 2),
            new THREE.MeshBasicMaterial({ color: 0x34d399, side: THREE.DoubleSide })
          );
          reticle.matrixAutoUpdate = false;
          reticle.visible = false;
          st.scene.add(reticle);

          const ar = { session, reticle, hitTestSource: null, placed: false };
          st.arSession = ar;

          session.addEventListener('end', () => {
            st.renderer.setAnimationLoop(null);
            st.renderer.xr.enabled = false;
            st.scene.remove(reticle);
            reticle.geometry.dispose();
            reticle.material.dispose();
            if (ar.hitTestSource) { try { ar.hitTestSource.cancel(); } catch (e) {} }
            st.arSession = null;
            // restore on-screen presentation
            st.molGroup.visible = true;
            st.molGroup.scale.setScalar(1);
            st.molGroup.position.set(0, 0, 0);
            const mount = mountRef.current;
            if (mount && mount.clientWidth) {
              st.camera.aspect = mount.clientWidth / mount.clientHeight;
              st.camera.updateProjectionMatrix();
              st.renderer.setSize(mount.clientWidth, mount.clientHeight);
            }
            if (st.startLoop) st.startLoop();
            setArActive(false);
            setArPlaced(false);
          });

          // Tap → anchor the molecule at the reticle, resting on the surface
          session.addEventListener('select', () => {
            if (ar.placed || !ar.reticle.visible) return;
            st.molGroup.position.setFromMatrixPosition(ar.reticle.matrix);
            st.molGroup.position.y += st.radius * st.arScale;
            st.molGroup.visible = true;
            ar.placed = true;
            ar.reticle.visible = false;
            setArPlaced(true);
          });

          st.renderer.xr.enabled = true;
          st.renderer.xr.setReferenceSpaceType('local');
          await st.renderer.xr.setSession(session);

          // Scale from scene units to ~0.5 m across; hidden until placed
          st.arScale = 0.25 / Math.max(st.radius, 1);
          st.molGroup.visible = false;
          st.molGroup.scale.setScalar(st.arScale);
          st.molGroup.position.set(0, 0, 0);
          st.molGroup.rotation.set(0, 0, 0);

          const viewerSpace = await session.requestReferenceSpace('viewer');
          ar.hitTestSource = await session.requestHitTestSource({ space: viewerSpace });

          st.renderer.setAnimationLoop((t, frame) => {
            if (frame && ar.hitTestSource && !ar.placed) {
              const refSpace = st.renderer.xr.getReferenceSpace();
              const hits = frame.getHitTestResults(ar.hitTestSource);
              if (hits.length) {
                ar.reticle.visible = true;
                ar.reticle.matrix.fromArray(hits[0].getPose(refSpace).transform.matrix);
              } else {
                ar.reticle.visible = false;
              }
            }
            if (ar.placed) st.molGroup.rotation.y += 0.012; // keep it spinning in the room
            st.renderer.render(st.scene, st.camera);
          });

          setArActive(true);
        } catch (e) {
          // permission denied / session failed — clean up and show fallback notice
          if (st.arSession) endAR();
          else if (st.startLoop) st.startLoop();
          setArNotice(true);
        }
      };

      // --- Scene setup (once) ---
      useEffect(() => {
        const mount = mountRef.current;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, Math.max(mount.clientWidth, 1) / Math.max(mount.clientHeight, 1), 0.1, 1000);
        camera.position.set(0, 2, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(Math.max(mount.clientWidth, 1), Math.max(mount.clientHeight, 1));
        mount.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 2;
        controls.maxDistance = 80;

        scene.add(new THREE.AmbientLight(0xffffff, 0.38));
        scene.add(new THREE.HemisphereLight(0xe8fff4, 0x0a0f0d, 0.4));
        const keyLight = new THREE.PointLight(0xffffff, 1.0); keyLight.position.set(14, 18, 20); scene.add(keyLight);
        const rimLight = new THREE.PointLight(0x34d399, 0.45); rimLight.position.set(-16, -10, -14); scene.add(rimLight);
        const fillLight = new THREE.PointLight(0x22d3ee, 0.2); fillLight.position.set(0, -16, 10); scene.add(fillLight);

        const molGroup = new THREE.Group();
        scene.add(molGroup);

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        const state = {
          scene, camera, renderer, controls, molGroup, raf: 0,
          interacting: false, tourActive: false, visible: true,
          atomMeshes: [], doubleBonds: [], tourStops: [], radius: 6,
          measurePicks: [], measureLine: null, selectedMesh: null,
          tween: null, lastT: performance.now(),
          downPos: null,
          arSession: null, arScale: 1, startLoop: null,
        };
        threeRef.current = state;

        controls.addEventListener('start', () => { state.interacting = true; });
        controls.addEventListener('end', () => { state.interacting = false; });

        const updatePointer = (e) => {
          const rect = renderer.domElement.getBoundingClientRect();
          pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
          pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        };
        const pick = () => {
          raycaster.setFromCamera(pointer, camera);
          const hits = raycaster.intersectObjects(state.atomMeshes, false);
          return hits.length ? hits[0].object : null;
        };

        // Distinguish taps from drags so orbiting doesn't select atoms
        const onDown = (e) => { state.downPos = { x: e.clientX, y: e.clientY }; };
        const onUp = (e) => {
          if (!state.downPos) return;
          const dx = e.clientX - state.downPos.x;
          const dy = e.clientY - state.downPos.y;
          state.downPos = null;
          if (dx * dx + dy * dy > 64) return; // moved > 8px → drag, not tap

          updatePointer(e);
          const obj = pick();

          if (modeRef.current.measureMode) {
            if (!obj) return;
            if (state.measurePicks.length >= 2) {
              state.measurePicks.forEach((m) => { m.scale.setScalar(1); m.material.emissiveIntensity = 0.06; });
              state.measurePicks = [];
              if (state.measureLine) { state.molGroup.remove(state.measureLine); state.measureLine = null; }
              setMeasureResult(null);
            }
            if (state.measurePicks.includes(obj)) return;

            obj.scale.setScalar(1.35);
            obj.material.emissiveIntensity = 0.7;
            state.measurePicks.push(obj);

            if (state.measurePicks.length === 1) {
              setMeasureResult('need2');
            } else if (state.measurePicks.length === 2) {
              const [m0, m1] = state.measurePicks;
              const d = m0.userData.atom.position.distanceTo(m1.userData.atom.position);
              const geo = new THREE.BufferGeometry().setFromPoints([m0.position.clone(), m1.position.clone()]);
              const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x34d399 }));
              state.molGroup.add(line);
              state.measureLine = line;
              setMeasureResult({ a: m0.userData.atom.symbol, b: m1.userData.atom.symbol, d });
            }
            return;
          }

          // Normal mode: tap atom → info card, tap empty → dismiss
          if (state.selectedMesh) {
            state.selectedMesh.scale.setScalar(1);
            state.selectedMesh.material.emissiveIntensity = 0.06;
            state.selectedMesh = null;
          }
          if (obj) {
            obj.scale.setScalar(1.4);
            obj.material.emissiveIntensity = 0.45;
            state.selectedMesh = obj;
            const a = obj.userData.atom;
            setSelectedAtom({ name: a.name, symbol: a.symbol, weight: a.weight, note: a.note });
          } else {
            setSelectedAtom(null);
          }
        };

        renderer.domElement.addEventListener('pointerdown', onDown);
        renderer.domElement.addEventListener('pointerup', onUp);

        const animate = () => {
          state.raf = requestAnimationFrame(animate);
          const now = performance.now();
          const dt = Math.min((now - state.lastT) / 1000, 0.05);
          state.lastT = now;

          if (!state.visible) return; // paused while tab hidden

          if (state.tween) {
            state.tween.t += dt / state.tween.dur;
            const k = easeInOut(Math.min(state.tween.t, 1));
            camera.position.lerpVectors(state.tween.fromP, state.tween.toP, k);
            controls.target.lerpVectors(state.tween.fromT, state.tween.toT, k);
            if (state.tween.t >= 1) { state.tween = null; if (!state.tourActive) controls.enabled = true; }
          }

          controls.update();

          if (state.doubleBonds.length) {
            const e = 0.25 + 0.5 * (0.5 + 0.5 * Math.sin(now / 1000 * 3));
            for (const c of state.doubleBonds) c.material.emissiveIntensity = e;
          }

          // --- vaporization: vibrate + fade when temp exceeds boiling point ---
          const vap = state.vapor;
          if (vap && vap.active) {
            const amp = 0.04 + vap.intensity * 0.28;
            molGroup.position.set(
              (Math.random() - 0.5) * amp,
              (Math.random() - 0.5) * amp,
              (Math.random() - 0.5) * amp
            );
          } else {
            molGroup.position.x += (0 - molGroup.position.x) * 0.2;
            molGroup.position.y += (0 - molGroup.position.y) * 0.2;
            molGroup.position.z += (0 - molGroup.position.z) * 0.2;
          }
          const targetOpacity = vap && vap.active ? Math.max(0.1, 1 - vap.intensity * 0.92) : 1;
          if (state.curOpacity == null) state.curOpacity = 1;
          if (Math.abs(state.curOpacity - targetOpacity) > 0.004) {
            state.curOpacity += (targetOpacity - state.curOpacity) * 0.12;
            molGroup.traverse((o) => {
              if (o.material) { o.material.transparent = true; o.material.opacity = state.curOpacity; }
            });
          }

          if (!state.interacting && !state.tourActive && !state.tween && !(vap && vap.active)) {
            molGroup.rotation.y += 0.003;
          }

          renderer.render(scene, camera);
        };
        // restartable loop handle (used when returning from an AR session)
        state.startLoop = () => {
          cancelAnimationFrame(state.raf);
          state.lastT = performance.now();
          animate();
        };
        animate();

        const ro = new ResizeObserver(() => {
          const w = mount.clientWidth, h = mount.clientHeight;
          if (!w || !h) return;
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        });
        ro.observe(mount);

        return () => {
          if (state.arSession) { try { state.arSession.session.end(); } catch (e) {} }
          state.renderer.setAnimationLoop(null);
          cancelAnimationFrame(state.raf);
          ro.disconnect();
          renderer.domElement.removeEventListener('pointerdown', onDown);
          renderer.domElement.removeEventListener('pointerup', onUp);
          controls.dispose();
          disposeGroup(molGroup);
          renderer.dispose();
          if (renderer.domElement.parentNode === mount) mount.removeChild(renderer.domElement);
        };
      }, []);

      // pause rendering while hidden; refresh size when shown
      useEffect(() => {
        const st = threeRef.current;
        if (!st) return;
        st.visible = visible;
        if (visible) {
          const id = setTimeout(() => {
            const mount = mountRef.current;
            if (!mount || !mount.clientWidth) return;
            st.camera.aspect = mount.clientWidth / mount.clientHeight;
            st.camera.updateProjectionMatrix();
            st.renderer.setSize(mount.clientWidth, mount.clientHeight);
          }, 60);
          return () => clearTimeout(id);
        }
      }, [visible]);

      useEffect(() => {
        modeRef.current.measureMode = measureMode;
        if (!measureMode) clearMeasure();
        else clearSelection();
      }, [measureMode]);

      // sync vaporization state (vibrate + fade) with the slider temperature
      useEffect(() => {
        const st = threeRef.current;
        if (!st) return;
        if (boilingPoint == null || !activeCompound) {
          st.vapor = { active: false, intensity: 0 };
          return;
        }
        const over = vaporTemp - boilingPoint;
        st.vapor = { active: over >= 0, intensity: Math.max(0, Math.min(1, over / 45)) };
      }, [vaporTemp, boilingPoint, activeCompound, status]);

      // --- Fetch + build on activeCompound change ---
      useEffect(() => {
        const state = threeRef.current;
        if (!state) return;

        setTourIndex(-1);
        setMeasureMode(false);
        setSelectedAtom(null);
        state.selectedMesh = null;
        state.measurePicks = [];
        if (state.measureLine) { state.molGroup.remove(state.measureLine); state.measureLine = null; }
        state.tween = null;
        state.controls.enabled = true;

        if (!activeCompound) {
          disposeGroup(state.molGroup);
          state.atomMeshes = []; state.doubleBonds = []; state.tourStops = [];
          setMolInfo(null); setTourStops([]); setStatus('idle');
          return;
        }

        let cancelled = false;
        const name = PUBCHEM_NAMES[activeCompound] || activeCompound;

        const render3d = (record) => {
          if (cancelled) return;
          try {
            const { group, radius, atomCount, formula, atoms, doubleBonds, tourStops } =
              buildMolecule(record, activeCompound);
            disposeGroup(state.molGroup);
            state.molGroup.add(group);
            state.molGroup.rotation.set(0, 0, 0);
            state.molGroup.position.set(0, 0, 0);
            state.curOpacity = 1;
            state.atomMeshes = atoms.map((a) => a.mesh);
            state.doubleBonds = doubleBonds;
            state.tourStops = tourStops;
            state.radius = radius;
            const dist = Math.max(radius * 2.6 + 3, 8);
            state.camera.position.set(0, radius * 0.4, dist);
            state.controls.target.set(0, 0, 0);
            state.controls.update();
            setMolInfo({ formula, atomCount });
            setTourStops(tourStops.map((s) => ({ title: s.title, text: s.text })));
            setStatus('ready');
          } catch (e) {
            setErrorMsg('Could not parse structure data.');
            setStatus('error');
          }
        };

        if (cacheRef.current[name]) {
          render3d(cacheRef.current[name]);
          return () => { cancelled = true; };
        }

        setStatus('loading');
        fetch(
          'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/' +
          encodeURIComponent(name) + '/record/JSON/?record_type=3d'
        )
          .then((r) => { if (!r.ok) throw new Error('PubChem responded ' + r.status); return r.json(); })
          .then((json) => {
            if (!json.PC_Compounds || !json.PC_Compounds.length) throw new Error('No 3D conformer available');
            cacheRef.current[name] = json;
            render3d(json);
          })
          .catch((e) => {
            if (cancelled) return;
            disposeGroup(state.molGroup);
            setErrorMsg(e.message);
            setStatus('error');
          });

        return () => { cancelled = true; };
      }, [activeCompound]);

      // --- Guided tour driver ---
      useEffect(() => {
        const st = threeRef.current;
        if (!st) return;
        st.tourActive = tourIndex >= 0;

        if (tourIndex < 0) {
          st.controls.enabled = true;
          return;
        }
        const stop = st.tourStops[tourIndex];
        if (stop) tweenCameraTo(stop.target, stop.dist);

        const timer = setTimeout(() => {
          setTourIndex((i) => (i + 1 < st.tourStops.length ? i + 1 : -1));
        }, 6000);
        return () => clearTimeout(timer);
      }, [tourIndex]);

      const ready = status === 'ready' && activeCompound;

      const ToolButton = ({ active, onClick, children }) => (
        <button
          onClick={onClick}
          className={`inline-flex items-center justify-center gap-1.5 rounded-xl px-3.5 py-2.5 text-xs font-semibold transition-all duration-150 ring-1 ring-inset active:scale-95
            ${active
              ? 'bg-accent/20 text-accent ring-accent/40'
              : 'bg-white/5 text-gray-300 ring-white/10'}`}
        >
          {children}
        </button>
      );

      return (
        <div className="flex h-full flex-col">
          {/* Toolbar */}
          <div className="flex items-center gap-2 px-4 py-3 shrink-0">
            <div>
              <h3 className="text-sm font-bold text-white leading-tight">3D Molecule</h3>
              <p className="text-[11px] text-gray-500">PubChem conformer · ball &amp; stick</p>
            </div>
            {ready && (
              <div className="ml-auto flex items-center gap-2">
                <ToolButton active={tourIndex >= 0} onClick={() => setTourIndex((i) => (i >= 0 ? -1 : 0))}>
                  <svg className="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 3l14 9-14 9V3z"/></svg>
                  Tour
                </ToolButton>
                <ToolButton active={measureMode} onClick={() => setMeasureMode((m) => !m)}>
                  <svg className="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 17l14-14 4 4L7 21z"/><path d="M7 11l2 2M11 7l2 2M15 3l2 2"/></svg>
                  Measure
                </ToolButton>
              </div>
            )}
          </div>

          {/* Canvas body */}
          <div className="relative flex-1 min-h-0 mx-3 mb-3 rounded-2xl overflow-hidden bg-surface-850/70 ring-1 ring-white/[0.06]">
            <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(52,211,153,0.12),transparent_62%)]"></div>
            <div ref={mountRef} className="absolute inset-0" style={{ touchAction: 'none' }} />
            <div className="pointer-events-none absolute inset-0 shadow-[inset_0_0_70px_rgba(0,0,0,0.55)]"></div>

            {/* Idle */}
            {status === 'idle' && (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-6 pointer-events-none">
                <svg className="h-9 w-9 text-accent/50 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <circle cx="12" cy="12" r="3" />
                  <ellipse cx="12" cy="12" rx="10" ry="4" />
                  <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)" />
                  <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-60 12 12)" />
                </svg>
                <p className="text-sm font-semibold text-gray-400">No compound selected</p>
                <p className="mt-1 text-xs text-gray-600">Tap a compound on the Profile tab</p>
              </div>
            )}

            {/* Loading */}
            {status === 'loading' && (
              <div className="absolute inset-0 flex flex-col items-center justify-center bg-surface-900/60 backdrop-blur-sm">
                <div className="h-8 w-8 rounded-full border-2 border-surface-600 border-t-accent animate-spin"></div>
                <p className="mt-3 text-xs font-medium text-gray-400">Fetching {activeCompound} from PubChem…</p>
              </div>
            )}

            {/* Error */}
            {status === 'error' && (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-6">
                <p className="text-sm font-semibold text-red-400">Couldn't load {activeCompound}</p>
                <p className="mt-1 text-xs text-gray-500">{errorMsg}</p>
                <p className="mt-2 text-[11px] text-gray-600">Check your connection and try another compound.</p>
              </div>
            )}

            {/* Vaporizing badge */}
            {ready && isVaporizing && !measureMode && (
              <div className="absolute top-3 left-3 right-3 rounded-lg bg-orange-500/15 ring-1 ring-orange-400/40 px-3 py-2 text-xs text-center animate-heatPulse">
                <span className="font-semibold text-orange-300">♨ Vaporizing</span>
                <span className="ml-1.5 text-gray-300">{vaporTemp}°C ≥ {boilingPoint}°C boiling point</span>
              </div>
            )}

            {/* Measure hint / result */}
            {ready && measureMode && (
              <div className="absolute top-3 left-3 right-3 rounded-lg bg-surface-900/85 backdrop-blur ring-1 ring-accent/30 px-3 py-2 text-xs text-center">
                {measureResult && measureResult !== 'need2' ? (
                  <span className="font-mono text-accent">
                    {measureResult.a}–{measureResult.b}: {measureResult.d.toFixed(2)} Å
                  </span>
                ) : (
                  <span className="text-gray-300">
                    {measureResult === 'need2' ? 'Tap a second atom…' : 'Tap two atoms to measure'}
                  </span>
                )}
              </div>
            )}

            {/* Tapped atom info card */}
            {ready && !measureMode && selectedAtom && (
              <div className="absolute inset-x-3 bottom-14 rounded-xl bg-surface-900/90 backdrop-blur ring-1 ring-white/10 px-4 py-3 shadow-2xl animate-fadeUp">
                <div className="flex items-baseline gap-2">
                  <span className="text-sm font-bold text-white">{selectedAtom.name}</span>
                  <span className="text-[11px] font-mono text-accent">{selectedAtom.symbol}</span>
                  <span className="ml-auto text-[11px] text-gray-500">{selectedAtom.weight} u</span>
                </div>
                {selectedAtom.note && (
                  <p className="mt-1.5 text-[11px] leading-snug text-emerald-300 border-t border-white/5 pt-1.5">
                    {selectedAtom.note}
                  </p>
                )}
              </div>
            )}

            {/* Guided tour narration */}
            {ready && tourIndex >= 0 && tourStops[tourIndex] && (
              <div className="absolute inset-x-3 bottom-14 rounded-xl bg-surface-900/90 backdrop-blur-md ring-1 ring-accent/25 p-4 shadow-xl animate-fadeUp">
                <div className="flex items-center gap-2 mb-1.5">
                  <span className="text-[10px] font-bold uppercase tracking-widest text-accent">
                    Tour · {tourIndex + 1}/{tourStops.length}
                  </span>
                  <button onClick={() => setTourIndex(-1)} className="ml-auto text-gray-500 text-xs px-2 py-1 -m-1">✕ Exit</button>
                </div>
                <p className="text-sm font-bold text-white">{tourStops[tourIndex].title}</p>
                <p className="mt-1 text-xs leading-relaxed text-gray-300">{tourStops[tourIndex].text}</p>
                <div className="mt-3 flex items-center gap-1.5">
                  {tourStops.map((_, i) => (
                    <button
                      key={i}
                      onClick={() => setTourIndex(i)}
                      className={`h-2 rounded-full transition-all ${i === tourIndex ? 'w-6 bg-accent' : 'w-2 bg-gray-600'}`}
                    />
                  ))}
                  <button
                    onClick={() => setTourIndex((i) => (i + 1 < tourStops.length ? i + 1 : -1))}
                    className="ml-auto text-xs font-semibold text-accent px-2 py-1 -m-1"
                  >
                    Next →
                  </button>
                </div>
              </div>
            )}

            {/* View in AR */}
            {ready && !arActive && !measureMode && tourIndex < 0 && !selectedAtom && !arNotice && (
              <button
                onClick={() => (arSupport ? startAR() : setArNotice(true))}
                className="absolute bottom-12 left-1/2 -translate-x-1/2 inline-flex items-center gap-2 rounded-full bg-accent/20 backdrop-blur ring-1 ring-accent/40 px-4 py-2.5 text-xs font-bold text-accent shadow-lg active:scale-95 transition-transform"
              >
                <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 3l7 4v10l-7 4-7-4V7l7-4z" />
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 11l7-4M12 11L5 7M12 11v10" />
                </svg>
                View in AR
              </button>
            )}

            {/* AR fallback notice */}
            {arNotice && (
              <div className="absolute inset-x-3 bottom-14 rounded-xl bg-surface-900/95 backdrop-blur ring-1 ring-orange-400/30 px-4 py-3 shadow-2xl animate-fadeUp">
                <p className="text-sm font-bold text-orange-300">AR not available</p>
                <p className="mt-1 text-xs leading-relaxed text-gray-400">
                  Viewing molecules in augmented reality requires a WebXR-compatible browser —
                  e.g. Chrome on a recent Android phone with ARCore, served over HTTPS.
                  Your current browser or device doesn't support WebXR AR.
                </p>
                <button onClick={() => setArNotice(false)} className="mt-2 text-xs font-semibold text-accent">
                  Got it
                </button>
              </div>
            )}

            {/* Info bar */}
            {ready && (
              <div className="absolute inset-x-0 bottom-0 flex items-center gap-2 px-3 py-2 bg-surface-900/80 backdrop-blur border-t border-white/5">
                <span className="text-sm font-bold text-white">{activeCompound}</span>
                <span
                  className="rounded-full px-2 py-0.5 text-[10px] font-semibold"
                  style={{
                    color: isCannabinoid ? '#4ade80' : '#22d3ee',
                    backgroundColor: isCannabinoid ? 'rgba(74,222,128,0.1)' : 'rgba(34,211,238,0.1)',
                  }}
                >
                  {isCannabinoid ? 'Cannabinoid' : 'Terpene'}
                </span>
                {molInfo && (
                  <span className="text-[10px] font-mono text-gray-400">{molInfo.formula}</span>
                )}
                {boilingPoint != null && (
                  <span className="text-[10px] font-mono" style={{ color: isVaporizing ? '#fb923c' : '#6b7280' }}>
                    bp {boilingPoint}°C
                  </span>
                )}
                <span className="ml-auto text-[10px] font-mono text-gray-500">
                  {allCompounds[activeCompound]}%
                </span>
              </div>
            )}
          </div>

          {ready && !measureMode && !selectedAtom && tourIndex < 0 && (
            <p className="shrink-0 pb-2 text-center text-[10px] text-gray-600">
              drag to rotate · pinch to zoom · tap an atom
            </p>
          )}

          {/* WebXR dom-overlay UI — rendered fullscreen by the browser during AR */}
          <div ref={arOverlayRef} className="fixed inset-0 z-50 pointer-events-none">
            {arActive && (
              <div className="absolute inset-x-0 bottom-0 flex flex-col items-center gap-3 px-4 pb-10">
                <p className="rounded-full bg-black/60 px-4 py-2 text-xs font-semibold text-white text-center">
                  {arPlaced
                    ? `${activeCompound} placed — move around to explore`
                    : 'Point your camera at a flat surface, then tap to place'}
                </p>
                <button
                  onClick={endAR}
                  className="pointer-events-auto rounded-full bg-white/15 backdrop-blur ring-1 ring-white/30 px-5 py-2.5 text-sm font-bold text-white active:scale-95"
                >
                  ✕ Exit AR
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ============================================================
       COMPOSITION CHART (Profile tab)
       ============================================================ */
    const {
      ResponsiveContainer, BarChart, Bar, XAxis, YAxis,
      CartesianGrid, Tooltip, Cell,
      RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
    } = Recharts;

    const CHART_COLORS = {
      Cannabinoid: '#4ade80',
      Terpene: '#22d3ee',
    };

    function buildChartData(strain) {
      const { cannabinoids, terpenes } = strain.composition;
      return [
        ...Object.entries(cannabinoids).map(([name, value]) => ({ name, value, category: 'Cannabinoid' })),
        ...Object.entries(terpenes).map(([name, value]) => ({ name, value, category: 'Terpene' })),
      ];
    }

    /* Entourage Effect model — terpene dominance → effect axes */
    const EFFECT_AXES = ['Focus', 'Energy', 'Sleep', 'Creativity'];
    const EFFECT_WEIGHTS = {
      Myrcene:       { Focus: 0.10, Energy: 0.05, Sleep: 1.00, Creativity: 0.15 },
      Limonene:      { Focus: 0.55, Energy: 0.85, Sleep: 0.10, Creativity: 0.55 },
      Pinene:        { Focus: 1.00, Energy: 0.55, Sleep: 0.05, Creativity: 0.45 },
      Terpinolene:   { Focus: 0.45, Energy: 1.00, Sleep: 0.00, Creativity: 0.95 },
      Linalool:      { Focus: 0.20, Energy: 0.05, Sleep: 0.90, Creativity: 0.25 },
      Caryophyllene: { Focus: 0.35, Energy: 0.15, Sleep: 0.60, Creativity: 0.30 },
      Humulene:      { Focus: 0.40, Energy: 0.20, Sleep: 0.45, Creativity: 0.25 },
    };

    function buildEffectData(strain) {
      const terps = strain.composition.terpenes;
      const raw = { Focus: 0, Energy: 0, Sleep: 0, Creativity: 0 };
      Object.entries(terps).forEach(([name, val]) => {
        const w = EFFECT_WEIGHTS[name];
        if (!w) return;
        EFFECT_AXES.forEach((ax) => { raw[ax] += val * w[ax]; });
      });
      const max = Math.max(...EFFECT_AXES.map((a) => raw[a]), 0.0001);
      return EFFECT_AXES.map((ax) => ({ effect: ax, value: Math.round((raw[ax] / max) * 100) }));
    }

    /* Breeder Mode — theoretical hybrid math (averages parent arrays) */
    const round2 = (n) => Math.round(n * 100) / 100;
    const firstWord = (s) => s.split(' ')[0];

    function suggestHybridName(mother, father) {
      const a = firstWord(mother.name).replace(/[^A-Za-z]/g, '');
      const b = firstWord(father.name).replace(/[^A-Za-z]/g, '');
      if (!a || !b) return `${firstWord(mother.name)} ${firstWord(father.name)}`;
      const head = a.slice(0, Math.max(2, Math.ceil(a.length / 2)));
      const tail = b.slice(Math.floor(b.length / 2));
      const blend = head + tail;
      return blend.charAt(0).toUpperCase() + blend.slice(1);
    }

    function createHybrid(mother, father, name) {
      const cannabinoids = {};
      Object.keys(mother.composition.cannabinoids).forEach((k) => {
        cannabinoids[k] = round2((mother.composition.cannabinoids[k] + (father.composition.cannabinoids[k] ?? 0)) / 2);
      });
      const terpenes = {};
      Object.keys(mother.composition.terpenes).forEach((k) => {
        terpenes[k] = round2((mother.composition.terpenes[k] + (father.composition.terpenes[k] ?? 0)) / 2);
      });
      return {
        id: 'hybrid-custom',
        name,
        type: 'Hybrid',
        lineage: `${mother.name} × ${father.name}`,
        description:
          `A theoretical hybrid bred from ${mother.name} (${mother.type}) and ${father.name} (${father.type}). ` +
          `Every value is the mathematical average of both parents' cannabinoid and terpene arrays — a sandbox prediction, not a lab result.`,
        composition: { cannabinoids, terpenes },
      };

      const isActive = payload.value === activeCompound;

      return (
        <g onClick={() => onSelect(payload.value)} style={{ cursor: 'pointer' }}>
          {isVapor && (
            <text x={x - 2} y={y} dy={4} textAnchor="end" fontSize={11} fill={VAPOR_COLOR}>♨</text>

          <text
            x={isVapor ? x - 14 : x} y={y} dy={4} textAnchor="end"
            fill={fill}
            fontSize={11}
            fontWeight={isActive || isVapor ? 700 : 500}
          >
            {payload.value}

        </g>
      );
    }
